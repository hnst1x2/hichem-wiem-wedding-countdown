<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hichem & Wiem — 28 Juin 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="petals" aria-hidden="true"></div>

  <main class="card">
    <header class="intro">
      <p class="eyebrow">Save the date</p>
      <h1 class="names">
        <span>Hichem</span>
        <span class="amp">&amp;</span>
        <span>Wiem</span>
      </h1>
      <p class="date">Dimanche 28 Juin 2026</p>
    </header>

    <section class="countdown" aria-live="polite">
      <div class="unit">
        <span class="value" id="days">--</span>
        <span class="label">Jours</span>
      </div>
      <div class="unit">
        <span class="value" id="hours">--</span>
        <span class="label">Heures</span>
      </div>
      <div class="unit">
        <span class="value" id="minutes">--</span>
        <span class="label">Minutes</span>
      </div>
      <div class="unit">
        <span class="value" id="seconds">--</span>
        <span class="label">Secondes</span>
      </div>
    </section>

    <p class="quote">
      &laquo; Deux &acirc;mes, un seul battement &mdash; le commencement d'une vie &agrave; deux. &raquo;
    </p>

    <div class="heart-pulse" aria-hidden="true">
      <svg viewBox="0 0 32 29" xmlns="http://www.w3.org/2000/svg">
        <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,12,15.4,16,20.6c4-5.2,16-11.2,16-20.6 C32,3.8,28.2,0,23.6,0z"/>
      </svg>
    </div>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
